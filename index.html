<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Task Pulse</title>
<style>
  :root{
    --bg:#13161d; --surface:#1a1f29; --surface-2:#1f2530; --line:#2a313d; --line-soft:#222936;
    --text:#e8ebf1; --muted:#8a93a6; --faint:#586073;
    --accent:#f5a524; --done:#46d27f; --prog:#5aa0f2; --todo:#5c6678; --late:#f4707a;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, "JetBrains Mono", monospace;
    --ui: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Helvetica Neue", system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0; height:100%}
  body{background:var(--bg); color:var(--text); font-family:var(--ui); -webkit-font-smoothing:antialiased;
    font-size:14px; line-height:1.45; height:100dvh; display:flex; flex-direction:column; overflow:hidden}
  .wrap{width:100%; max-width:600px; margin:0 auto; display:flex; flex-direction:column; height:100%}

  /* header */
  .phead{flex:0 0 auto; padding:14px 16px 12px; background:var(--surface); border-bottom:1px solid var(--line)}
  .prow1{display:flex; align-items:baseline; justify-content:space-between; gap:10px}
  .pname{font-size:15px; font-weight:650; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .ptoday{font:12px/1 var(--mono); color:var(--accent); flex:0 0 auto}
  .pbar{height:6px; border-radius:99px; background:var(--surface-2); margin:10px 0 7px; overflow:hidden}
  .pbar > i{display:block; height:100%; background:linear-gradient(90deg,#3f7fd0,#5aa0f2); border-radius:99px; transition:width .4s}
  .prow2{display:flex; justify-content:space-between; font-size:12px; color:var(--muted)}
  .prow2 b{color:var(--text); font:600 12px/1 var(--mono)}
  .prow2 .behind{color:var(--late)} .prow2 .ahead{color:var(--done)}
  .tools{display:flex; gap:8px; margin-top:11px}
  .btn{font:inherit; font-size:12px; color:var(--text); background:var(--surface-2); border:1px solid var(--line);
    border-radius:7px; padding:6px 10px; cursor:pointer}
  .btn:focus-visible{outline:2px solid var(--accent); outline-offset:1px}
  .btn.primary{background:#243042; border-color:#33455e}

  /* stream */
  .stream{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:6px 14px 40px}
  .stream.drag{outline:2px dashed var(--accent); outline-offset:-8px; border-radius:14px}

  /* progress overview */
  .poview{background:var(--surface); border:1px solid var(--line-soft); border-radius:12px; padding:12px 14px; margin:10px 0 4px}
  .poview h3{margin:0 0 6px; font-size:11px; color:var(--muted); letter-spacing:.06em; font-weight:600}
  .prog-row{margin:9px 0}
  .prog-row .top{display:flex; justify-content:space-between; align-items:baseline; gap:8px}
  .prog-row .pn{font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .prog-row .pv{flex:0 0 auto; font:12px/1 var(--mono); color:var(--muted)}
  .prog-row .pbar2{height:6px; border-radius:99px; background:var(--surface-2); overflow:hidden; margin-top:6px}
  .prog-row .pbar2 > i{display:block; height:100%; border-radius:99px; background:var(--prog); transition:width .4s}
  .prog-row.full{margin-top:6px; padding-top:11px; border-top:1px solid var(--line-soft)}
  .prog-row.full .pn{font-weight:650; font-size:14px}
  .prog-row.full .pv{color:var(--text)}
  .prog-row.full .pbar2 > i{background:linear-gradient(90deg,#3f7fd0,#5aa0f2)}

  .seclabel{display:flex; align-items:center; gap:8px; color:var(--muted); font-size:11px; letter-spacing:.06em;
    margin:16px 2px 8px; user-select:none}
  .seclabel .ln{flex:1 1 auto; height:1px; background:var(--line-soft)}
  .seclabel.click{cursor:pointer}
  .seclabel .cnt{font:11px/1 var(--mono); color:var(--faint)}

  .nowline{position:relative; margin:18px 0 12px; display:flex; align-items:center; gap:10px}
  .nowline::before, .nowline::after{content:""; height:2px; flex:1 1 auto; background:var(--accent); box-shadow:0 0 8px rgba(245,165,36,.5)}
  .nowtag{font:600 12px/1 var(--mono); color:#1b150a; background:var(--accent); padding:4px 9px; border-radius:99px; white-space:nowrap}

  /* cards (clickable → expand) */
  .card{display:flex; background:var(--surface); border:1px solid var(--line-soft); border-radius:11px; margin:8px 0; overflow:hidden; cursor:pointer}
  .card .stripe{flex:0 0 4px; background:var(--todo)}
  .card.s-done .stripe{background:var(--done)} .card.s-prog .stripe{background:var(--prog)}
  .card.s-late .stripe{background:var(--late)} .card.s-todo .stripe{background:var(--todo)}
  .card .rcol{flex:1 1 auto; min-width:0}
  .card .cmain{display:flex; align-items:flex-start; padding:10px 13px}
  .card .cbody{flex:1 1 auto; min-width:0}
  .eyebrow{font-size:11px; color:var(--muted); margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .eyebrow .ph{color:var(--prog)}
  .ctitle{font-size:15px; font-weight:600; line-height:1.3; word-break:break-word}
  .cmeta{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:6px; font:12px/1.2 var(--mono); color:var(--muted)}
  .cmeta .ok{color:var(--done)} .cmeta .warn{color:var(--late)} .cmeta .due{color:var(--accent)}
  .card .chev{flex:0 0 auto; color:var(--faint); font-size:20px; line-height:1; padding:1px 0 0 8px; transition:transform .15s; transform:rotate(90deg)}
  .card.open .chev{transform:rotate(270deg)}
  .card.s-done{opacity:.62} .card.s-done .ctitle{font-weight:500}
  .card.s-prog{box-shadow:0 0 0 1px rgba(90,160,242,.12)}
  .card.s-late{border-color:#5a3338}
  .pdot{width:8px; height:8px; border-radius:50%; background:var(--prog); flex:0 0 auto}
  .pdot.live{animation:pulse 1.8s ease-out infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(90,160,242,.5)} 70%{box-shadow:0 0 0 7px rgba(90,160,242,0)} 100%{box-shadow:0 0 0 0 rgba(90,160,242,0)}}
  .chip{font:11px/1 var(--mono); color:var(--muted); background:var(--surface-2); border:1px solid var(--line-soft); border-radius:6px; padding:3px 6px}

  /* detail panel: 冒頭に 目的バッジ＋核 → 説明 → メタ */
  .detail{display:none; padding:2px 13px 13px}
  .card.open .detail{display:block}
  .detail > *:first-child{padding-top:10px; border-top:1px solid var(--line-soft); margin-top:8px}
  .detail .purpose{display:inline-block; font:600 10px/1 var(--mono); letter-spacing:.05em; padding:4px 8px; border-radius:6px;
    background:var(--surface-2); color:var(--muted); border:1px solid var(--line-soft)}
  .detail .purpose.p-exp{color:#f5c451; border-color:#5a4a1f; background:rgba(245,196,81,.09)}
  .detail .purpose.p-sys{color:#5aa0f2; border-color:#2d4564; background:rgba(90,160,242,.09)}
  .detail .purpose.p-dev{color:#46d27f; border-color:#1f5a38; background:rgba(70,210,127,.09)}
  .detail .purpose.p-post{color:#c98bf0; border-color:#4a2f5a; background:rgba(201,139,240,.09)}
  .detail .core{font-size:14px; font-weight:650; color:var(--text); line-height:1.5; margin-top:9px}
  .detail .desc{font-size:12.5px; color:var(--muted); line-height:1.55; margin:8px 0 9px; white-space:pre-wrap}
  .detail .dmeta{display:flex; flex-wrap:wrap; gap:5px 14px; font:11px/1.3 var(--mono); color:var(--muted)}
  .detail .dmeta a{color:var(--prog); text-decoration:none; word-break:break-all}

  .empty{margin:40px 6px; text-align:center; color:var(--muted)}
  .empty code{font:12px/1.6 var(--mono); color:var(--text); background:var(--surface-2); padding:2px 6px; border-radius:5px}
  .stream{animation:fadein .4s ease both}
  @keyframes fadein{from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none}}
  @media (prefers-reduced-motion: reduce){ *{animation:none!important; transition:none!important} }

  input[type=file]{display:none}
  .paste{padding:0 16px; background:var(--surface); border-bottom:1px solid var(--line); display:none}
  .paste.open{display:block; padding:12px 16px}
  .paste textarea{width:100%; height:130px; resize:vertical; background:var(--bg); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:10px; font:12px/1.5 var(--mono)}
  .paste .prow{display:flex; gap:8px; margin-top:8px; align-items:center}
  .paste .hint{color:var(--muted); font-size:11px}

  /* tabs（タスク / ポスト化スタンバイ） */
  .tabs{display:flex; gap:6px; margin-top:11px}
  .tab{font:inherit; font-size:12px; color:var(--muted); background:transparent; border:1px solid var(--line);
    border-radius:7px; padding:6px 12px; cursor:pointer}
  .tab.on{color:var(--text); background:var(--surface-2); border-color:#33455e}
  .tab:focus-visible{outline:2px solid var(--accent); outline-offset:1px}
  .wrap.v-standby .pbar, .wrap.v-standby .prow2{display:none}  /* スタンバイ時はタスク専用の進捗表示を隠す */

  /* ポスト化スタンバイのカード（＝あとは書くだけの待機列） */
  .scard{background:var(--surface); border:1px solid var(--line-soft); border-radius:11px; margin:8px 0; padding:12px 14px}
  .scard .stop{display:flex; align-items:flex-start; justify-content:space-between; gap:10px}
  .scard .sname{font-size:15px; font-weight:650; line-height:1.3; word-break:break-word}
  .scard .fresh{flex:0 0 auto; font:11px/1 var(--mono); color:var(--muted); background:var(--surface-2);
    border:1px solid var(--line-soft); border-radius:6px; padding:4px 7px; white-space:nowrap}
  .scard .claim{font-size:13px; color:var(--text); line-height:1.55; margin:8px 0 10px}
  .scard .todo{display:inline-flex; align-items:center; gap:6px; font:600 12px/1.3 var(--ui);
    border-radius:7px; padding:7px 11px; background:var(--surface-2); color:var(--muted); border:1px solid var(--line-soft)}
  .scard .todo.ready{color:var(--done); background:rgba(70,210,127,.10); border-color:#1f5a38}  /* 本文化のみ＝今すぐ書ける */
  .sempty{margin:40px 6px; text-align:center; color:var(--muted)}
  .sempty code{font:12px/1.6 var(--mono); color:var(--text); background:var(--surface-2); padding:2px 6px; border-radius:5px}

  /* ===== PC / 広い画面 ===== */
  @media (min-width: 768px){
    .wrap{ max-width: 960px; }
    .stream{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      grid-auto-rows: max-content;  /* 固定高さscroll容器＋align-items:start＋カードのoverflow:hidden(min-height:0)で行が21pxに潰れ、カードが重なるのを防ぐ */
      gap: 8px 14px;
      align-items:start;     /* 展開カードが隣を引き伸ばさない */
      align-content:start;
    }
    /* 全幅で見せたい要素は1行ぶち抜き */
    .stream > .poview,
    .stream > .seclabel,
    .stream > .nowline,
    .stream > .empty,
    .stream > .sempty{ grid-column: 1 / -1; }
    /* gapで間隔を作るのでカード個別marginは消す */
    .stream > .card, .stream > .scard{ margin: 0; }
  }
  @media (min-width: 1200px){
    .wrap{ max-width: 1240px; }
    .stream{ grid-template-columns: repeat(3, minmax(0,1fr)); }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="phead">
    <div class="prow1"><span class="pname" id="pname">—</span><span class="ptoday" id="ptoday"></span></div>
    <div class="pbar"><i id="pbar" style="width:0%"></i></div>
    <div class="prow2"><span>進捗 <b id="ppct">0%</b></span><span id="psched"></span></div>
    <div class="tools">
      <button class="btn" id="btnSample">サンプル</button>
      <button class="btn" id="btnPaste">貼り付け</button>
      <label class="btn primary" for="file">ファイルを開く</label>
      <input id="file" type="file" accept=".md,.markdown,.csv,.txt,.tsv">
    </div>
    <div class="tabs" id="tabs">
      <button class="tab on" data-view="tasks">タスク</button>
      <button class="tab" data-view="standby">ポスト化スタンバイ</button>
    </div>
  </header>

  <div class="paste" id="pastePanel">
    <textarea id="ta" spellcheck="false" placeholder="markdownのパイプ表を貼り付け（| No | タスク | 工数 | 担当 | 起案日 | 状態 | 期限 | 目的 | 核 | 説明 | 備考 |）"></textarea>
    <div class="prow">
      <button class="btn primary" id="btnApply">反映</button>
      <span class="hint">目的=一次体験/システム改善/開発/発信 等・核=一文（タップで冒頭に出る）／起案日=提案した日・YYYY-MM-DD／期限=鮮度や締切がある時だけ</span>
    </div>
  </div>

  <div class="stream" id="stream"></div>
</div>

<script>
(() => {
  "use strict";
  const $ = s => document.querySelector(s);

  // ===== sample（目的・核つき）=====
  const SAMPLE = [
    "| No | タスク | 工数 | 担当 | 起案日 | 状態 | 期限 | 目的 | 核 | 説明 | 備考 |",
    "|----|--------|-----:|------|--------|------|------|------|----|------|------|",
    "| 1   | Task Pulse     |     | ゆいた | 2026-06-12 | 進行中 |            | 開発 |  | 自分の開発タスクを「今／次」基準で見る縦フロー可視化ツール。 |     |",
    "| 1.1 | 今ライン縦フローUI  | 1   | Claude | 2026-06-12 | 完了   |            | 開発 | 横ガントを縦の「今」基準フローに置換＝スマホで指1本で読める | 完了／進行中／これからを縦スクロール。横スクロールを消した。 | #1 |",
    "| 1.2 | markdownパーサ      | 0.5 | Claude | 2026-06-13 | 進行中 |            | 開発 | パイプ表→タスク配列。列見出しの表記揺れを吸収する | CSV/markdownどちらでも、列順が多少違っても見出しで拾う。 |     |",
    "| 1.3 | 起案経過＋目的核展開| 0.5 | Claude | 2026-06-14 | 進行中 |            | システム改善 | 時間軸を起案経過に・タップで目的と核を出して「思い出せる」UIにする | 予定スケジュール前提をやめ、起案からの経過＋クリック展開（目的バッジ＋核）へ。 |     |",
    "| 2   | どこからでも(P2)    |     | ゆいた | 2026-06-13 | 進行中 |            | 開発 |  | どの端末でも同じURLで自分の台帳を開けるようにする。 |     |",
    "| 2.1 | GitHub Pages公開    | 0.5 | ゆいた | 2026-06-13 | 完了   |            | 開発 | repoをPages公開＝どの端末でもURLで開ける | スマホでもURLで開けるのが最低ライン。 |     |",
    "| 2.2 | 台帳URL fetch配線   | 1   | Claude | 2026-06-13 | 未着手 |            | 開発 | ?src=URLで台帳を読む。同repoならCORS不要 | tasks.mdを同repoに置けば相対fetchで同一オリジン。 |     |",
    "| 3   | 差別化・品質(P3)    |     | ゆいた | 2026-06-14 | 未着手 |            | 開発 |  | 参照クローンから離す＋編集・絞り込み等の品質向上。 |     |",
    "| 4   | 発信ネタ(一次体験)  |     | ゆいた | 2026-06-13 | 進行中 |            | 一次体験 |  | 触ってから出す一次体験ネタの仕込み。 |     |",
    "| 4.1 | M3比較              | 1   | ゆいた | 2026-06-13 | 未着手 | 2026-06-17 | 一次体験 | 新モデルM3を自分の実タスクで回してClaudeと体感比較する | OpenRouter等でいつものClaude Codeタスクを1個M3で回す。粘り・1M context・出力差。 |     |",
    "| 4.2 | コスト系¥実写       | 0.5 | ゆいた | 2026-06-14 | 未着手 | 2026-06-20 | 一次体験 | ¥実写スクショ＋狂った絶対値1点＝即検証できる領収書性 | Claude Codeのステータスバー¥を実写。雑な換算はしない。 |     |",
    "| 4.3 | ニュース反応：旗艦モデル政府停止 | 0.5 | ゆいた | 2026-06-12 | 完了 |  | 発信 | 「危険」の中身は日常のClaude Code作業＝兵器扱いの建付けに当事者として疑問を呈す | Anthropic旗艦(Fable5/Mythos5)が米輸出規制で停止。事実と解釈を分け、公式声明を引用RT＋補足リプ(一次ソース付)で反応。公開済。 | anthropic.com/news/fable-mythos-access |",
  ].join("\n");

  // ===== date utils =====
  const parseDate = s => { if(!s) return null;
    const m = String(s).trim().match(/(\d{4})\D(\d{1,2})\D(\d{1,2})/); if(!m) return null;
    return new Date(+m[1], +m[2]-1, +m[3], 12); };
  const dayMs = 86400000;
  const diffDays = (a,b) => Math.round((b-a)/dayMs);
  const fmtMD = d => (d.getMonth()+1)+"/"+d.getDate();
  const fmtISO = d => d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  const today = (()=>{ const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate(),12); })();
  const WD = ["日","月","火","水","木","金","土"];

  // ===== parser =====
  const HEAD_MAP = {
    no:["no","番号","#"], task:["タスク","作業項目","作業","項目","名称"],
    effort:["工数","人日"], owner:["担当","assignee","owner"],
    ki:["起案日","起案","提案日","作成日","予定開始"],
    status:["状態","ステータス","status"],
    purpose:["目的","種別","カテゴリ","区分","type"],
    core:["核","要点","骨子","essence"],
    dl:["期限","締切","deadline","鮮度期限"],
    done_at:["完了日","実績終了","完了"],
    desc:["説明","概要","要約","detail","内容"],
    note:["備考","メモ","note","link","リンク"],
  };
  const norm = s => String(s||"").trim().toLowerCase().replace(/\s+/g,"");
  const matchCol = h => { const n=norm(h);
    for(const k in HEAD_MAP) if(HEAD_MAP[k].some(a=>norm(a)===n)) return k;
    for(const k in HEAD_MAP) if(HEAD_MAP[k].some(a=>n.includes(norm(a)))) return k;
    return null; };
  function parse(text){
    const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.startsWith("|"));
    if(lines.length<2) return [];
    const cut = l => l.replace(/^\||\|$/g,"").split("|").map(c=>c.trim());
    const headers = cut(lines[0]).map(matchCol);
    let rows = lines.slice(1);
    if(rows.length && /^[\s:|-]+$/.test(rows[0].replace(/\|/g,""))) rows = rows.slice(1);
    const out=[];
    for(const ln of rows){ const c=cut(ln), o={}; headers.forEach((k,i)=>{ if(k && o[k]==null) o[k]=c[i]??""; });
      if(!o.no && !o.task) continue;
      out.push({ no:(o.no||"").trim(), task:o.task||"", effort:o.effort||"", owner:o.owner||"",
        ki:parseDate(o.ki), dl:parseDate(o.dl), doneAt:parseDate(o.done_at),
        status:(o.status||"").trim(), purpose:(o.purpose||"").trim(), core:(o.core||"").trim(),
        desc:(o.desc||"").trim(), note:(o.note||"").trim() }); }
    return out;
  }

  const numEffort = s => { const n=parseFloat(String(s).replace(/[^\d.]/g,"")); return isNaN(n)?null:n; };
  const isParent = (t,all) => all.some(x=>x!==t && x.no.startsWith(t.no+"."));
  function dispStatus(t){
    if(/完了|done|✓|✔/i.test(t.status)) return "done";
    if(t.dl && t.dl<today) return "late";
    if(/進行|doing|wip/i.test(t.status)) return "prog";
    return "todo";
  }
  const topPhase = (no,all) => { const r=no.split(".")[0]; const p=all.find(x=>x.no===r);
    return (p && p.no!==no) ? p.task : ""; };
  const kiText = t => { if(!t.ki) return ""; const d=diffDays(t.ki,today);
    return d<=0 ? "起案 今日" : "起案から"+d+"日"; };
  const purposeClass = p => /一次体験|体験/.test(p)?"p-exp" : /システム|改善|運用/.test(p)?"p-sys"
    : /開発|実装|コード/.test(p)?"p-dev" : /発信|ポスト|リプ|投稿/.test(p)?"p-post" : "";

  let TASKS=[]; let doneOpen=false;
  let STANDBY=[]; let view="tasks";

  function render(){
    const stream=$("#stream"); stream.innerHTML="";
    if(!TASKS.length){
      stream.innerHTML='<div class="empty">表が見つかりません。<br>「ファイルを開く」か「貼り付け」で <code>| No | タスク | 工数 | 起案日 | 状態 | 目的 | 核 | … |</code> 形式のmarkdown表を渡してください。</div>';
      head([]); return;
    }
    const leaves = TASKS.filter(t=>!isParent(t,TASKS));
    const g = {done:[],late:[],prog:[],todo:[]};
    for(const t of leaves) g[dispStatus(t)].push(t);
    g.done.sort((a,b)=>((b.doneAt||b.ki||today)-(a.doneAt||a.ki||today)));
    g.late.sort((a,b)=>((a.dl||today)-(b.dl||today)));
    g.prog.sort((a,b)=>((a.ki||today)-(b.ki||today)));
    g.todo.sort((a,b)=>{ if(a.dl&&!b.dl) return -1; if(!a.dl&&b.dl) return 1;
      return ((a.dl||a.ki||today)-(b.dl||b.ki||today)); });

    head(leaves);
    stream.appendChild(progressView(leaves));

    if(g.done.length){
      const lab=document.createElement("div"); lab.className="seclabel click";
      lab.innerHTML='<span>完了</span><span class="cnt">'+g.done.length+'</span><span class="ln"></span><span class="cnt">'+(doneOpen?"隠す":"表示")+'</span>';
      lab.onclick=()=>{ doneOpen=!doneOpen; render(); };
      stream.appendChild(lab);
      if(doneOpen) g.done.forEach(t=>stream.appendChild(card(t,"done")));
    }

    const nl=document.createElement("div"); nl.className="nowline";
    nl.innerHTML='<span class="nowtag">今 · '+fmtMD(today)+' ('+WD[today.getDay()]+')</span>';
    stream.appendChild(nl);

    if(g.late.length){ stream.appendChild(seclabel("遅延（期限切れ）", g.late.length)); g.late.forEach(t=>stream.appendChild(card(t,"late"))); }
    if(g.prog.length){ stream.appendChild(seclabel("進行中", g.prog.length)); g.prog.forEach(t=>stream.appendChild(card(t,"prog"))); }
    if(g.todo.length){ stream.appendChild(seclabel("これから", g.todo.length)); g.todo.forEach(t=>stream.appendChild(card(t,"todo"))); }
  }

  function seclabel(text,n){ const d=document.createElement("div"); d.className="seclabel";
    d.innerHTML='<span>'+text+'</span><span class="cnt">'+n+'</span><span class="ln"></span>'; return d; }

  function card(t,kind){
    const el=document.createElement("div"); el.className="card s-"+kind; el.dataset.no=t.no;
    const phase=topPhase(t.no,TASKS); const eff=numEffort(t.effort);
    const eye=[ phase?('<span class="ph">'+esc(phase)+'</span>'):"", eff?(eff+'人日'):"", t.owner?esc(t.owner):"" ].filter(Boolean).join(' · ');

    let meta="";
    if(kind==="done"){
      const lead = (t.ki && t.doneAt) ? diffDays(t.ki,t.doneAt) : null;
      meta='<span class="ok">✓ 完了</span>'+(t.doneAt?' '+fmtMD(t.doneAt):"")+(lead!=null?' ・起案→完了 '+lead+'日':"");
    } else if(kind==="late"){
      const od = t.dl?diffDays(t.dl,today):0;
      meta='<span class="pdot live"></span>'+kiText(t)+' <span class="warn">・期限 '+(t.dl?fmtMD(t.dl):"–")+' 超過'+(od>0?'・'+od+'日':"")+'</span>';
    } else if(kind==="prog"){
      meta='<span class="pdot live"></span>'+kiText(t);
      if(t.dl){ const d=diffDays(today,t.dl); meta+=' <span class="due">・期限 '+fmtMD(t.dl)+(d>0?'（あと'+d+'日）':d===0?'（今日）':"")+'</span>'; }
    } else {
      meta=kiText(t);
      if(t.dl){ const d=diffDays(today,t.dl); meta+=' <span class="due">・期限 '+fmtMD(t.dl)+(d>0?'（あと'+d+'日）':d===0?'（今日）':"")+'</span>'; }
    }

    const dmeta=[];
    if(t.ki) dmeta.push('起案 '+fmtISO(t.ki)+'（'+kiText(t).replace('起案','').trim()+'）');
    if(t.dl) dmeta.push('期限 '+fmtISO(t.dl));
    if(eff) dmeta.push('工数 '+eff+'人日');
    if(t.owner) dmeta.push('担当 '+esc(t.owner));
    dmeta.push('状態 '+esc(t.status||"—"));
    if(t.note){ const u=t.note.match(/https?:\/\/\S+/); dmeta.push(u?'<a href="'+esc(u[0])+'" target="_blank" rel="noopener">'+esc(t.note)+'</a>':esc(t.note)); }

    const hasHead = t.purpose || t.core;
    const detail =
      (hasHead ? '<div class="dhead">'+
          (t.purpose?'<span class="purpose '+purposeClass(t.purpose)+'">'+esc(t.purpose)+'</span>':'')+
          (t.core?'<div class="core">'+esc(t.core)+'</div>':'')+
        '</div>' : '')+
      (t.desc ? '<div class="desc">'+esc(t.desc)+'</div>'
              : (!hasHead ? '<div class="desc"><span style="color:var(--faint)">（目的・核・説明 未記入）</span></div>' : ''))+
      '<div class="dmeta">'+dmeta.join('')+'</div>';

    el.innerHTML=
      '<span class="stripe"></span><div class="rcol">'+
        '<div class="cmain"><div class="cbody">'+
          (eye?'<div class="eyebrow">'+eye+'</div>':"")+
          '<div class="ctitle">'+esc(t.task)+'</div>'+
          '<div class="cmeta">'+meta+'</div>'+
        '</div><span class="chev">›</span></div>'+
        '<div class="detail">'+detail+'</div>'+
      '</div>';
    return el;
  }

  function progressView(leaves){
    const wrap=document.createElement("div"); wrap.className="poview"; let html='<h3>進捗</h3>';
    const roots = TASKS.filter(t=>!t.no.includes("."));
    let gT=0,gD=0;
    for(const r of roots){
      const ds = leaves.filter(l=> l.no===r.no || l.no.startsWith(r.no+"."));
      const total = ds.reduce((s,t)=>s+(numEffort(t.effort)??0),0);
      const done = ds.filter(t=>dispStatus(t)==="done").reduce((s,t)=>s+(numEffort(t.effort)??0),0);
      gT+=total; gD+=done;
      html += progRow(false, r.task, total?Math.round(done/total*100):0, done, total);
    }
    html += progRow(true, "全体", gT?Math.round(gD/gT*100):0, gD, gT);
    wrap.innerHTML = html; return wrap;
  }
  function progRow(full,name,pct,done,total){
    const fmt=n=>(n%1?n.toFixed(1):n);
    return '<div class="prog-row'+(full?' full':'')+'">'+
      '<div class="top"><span class="pn">'+esc(name)+'</span><span class="pv">'+pct+'% · '+fmt(done)+'/'+fmt(total)+'人日</span></div>'+
      '<div class="pbar2"><i style="width:'+pct+'%"></i></div></div>';
  }

  function head(leaves){
    const roots = TASKS.filter(t=>!t.no.includes("."));
    $("#pname").textContent = roots.length===1 ? roots[0].task : (roots.length||0)+" プロジェクト";
    $("#ptoday").textContent = "今日 "+fmtMD(today);
    const total = leaves.reduce((s,t)=>s+(numEffort(t.effort)??0),0);
    const done = leaves.filter(t=>dispStatus(t)==="done").reduce((s,t)=>s+(numEffort(t.effort)??0),0);
    const pct = total?Math.round(done/total*100):0;
    $("#pbar").style.width = pct+"%"; $("#ppct").textContent = pct+"%";
    const lateN = leaves.filter(t=>dispStatus(t)==="late").length;
    const doneN = leaves.filter(t=>dispStatus(t)==="done").length;
    $("#psched").innerHTML = lateN>0 ? '<span class="behind">遅延 '+lateN+'件</span>'
      : (total && doneN===leaves.length ? '<span class="ahead">全完了</span>' : '完了 '+doneN+'/'+leaves.length+'件');
  }
  const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

  function load(text){ TASKS=parse(text); doneOpen=false; setView("tasks"); render(); }

  // ===== ポスト化スタンバイ（層B＝あとは書くだけ）。タスクとは別パース・別描画 =====
  function setView(v){ view=v;
    document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on", t.dataset.view===v));
    document.querySelector(".wrap").classList.toggle("v-standby", v==="standby"); }
  const SHEAD = { name:["ネタ","題材","topic"], claim:["主張","核","要点","claim"],
    bone:["手元の骨","骨","bone"], todo:["残作業","残り","todo"], fresh:["鮮度","freshness"] };
  const snorm = s => String(s||"").trim().toLowerCase().replace(/（[^）]*）/g,"").replace(/\([^)]*\)/g,"").replace(/\s+/g,"");
  const matchStandby = h => { const n=snorm(h);
    for(const k in SHEAD) if(SHEAD[k].some(a=>snorm(a)===n)) return k;
    for(const k in SHEAD) if(SHEAD[k].some(a=>n.includes(snorm(a)))) return k; return null; };
  function parseStandby(text){
    const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.startsWith("|"));
    if(lines.length<2) return [];
    const cut=l=>l.replace(/^\||\|$/g,"").split("|").map(c=>c.trim());
    const headers=cut(lines[0]).map(matchStandby);
    let rows=lines.slice(1);
    if(rows.length && /^[\s:|-]+$/.test(rows[0].replace(/\|/g,""))) rows=rows.slice(1);
    const out=[];
    for(const ln of rows){ const c=cut(ln), o={}; headers.forEach((k,i)=>{ if(k && o[k]==null) o[k]=c[i]??""; });
      if(!o.name) continue;
      out.push({ name:o.name||"", claim:o.claim||"", bone:o.bone||"", todo:o.todo||"", fresh:o.fresh||"" }); }
    return out;
  }
  const isReady = s => /本文化のみ|書くだけ|あとは書く/.test(s.todo);
  function scard(s){
    const el=document.createElement("div"); el.className="scard"; const ready=isReady(s);
    el.innerHTML=
      '<div class="stop"><div class="sname">'+esc(s.name)+'</div>'+
        (s.fresh?'<span class="fresh">鮮度 '+esc(s.fresh)+'</span>':"")+'</div>'+
      (s.claim?'<div class="claim">'+esc(s.claim)+'</div>':"")+
      '<div class="todo'+(ready?" ready":"")+'">'+(ready?"✍️ ":"")+'残作業：'+esc(s.todo||"—")+'</div>';
    return el;
  }
  function renderStandby(){
    const stream=$("#stream"); stream.innerHTML="";
    $("#pname").textContent="ポスト化スタンバイ"; $("#ptoday").textContent="今日 "+fmtMD(today);
    if(!STANDBY.length){
      stream.innerHTML='<div class="sempty">スタンバイがありません。<br>Drive「00_ポスト化スタンバイ.md」の <code>## スタンバイ一覧</code> を <code>standby.md</code> に反映してください。</div>';
      return;
    }
    const ready=STANDBY.filter(isReady), rest=STANDBY.filter(s=>!isReady(s));
    if(ready.length){
      const lab=document.createElement("div"); lab.className="seclabel";
      lab.innerHTML='<span>書くだけ（本文化のみ）</span><span class="cnt">'+ready.length+'</span><span class="ln"></span>';
      stream.appendChild(lab); ready.forEach(s=>stream.appendChild(scard(s)));
    }
    if(rest.length){
      const lab=document.createElement("div"); lab.className="seclabel";
      lab.innerHTML='<span>残作業あり</span><span class="cnt">'+rest.length+'</span><span class="ln"></span>';
      stream.appendChild(lab); rest.forEach(s=>stream.appendChild(scard(s)));
    }
  }
  function loadStandby(text){ STANDBY=parseStandby(text); if(view==="standby") renderStandby(); }

  $("#stream").addEventListener("click", e=>{
    if(e.target.closest("a")) return;
    const c = e.target.closest(".card"); if(c) c.classList.toggle("open");
  });

  $("#tabs").addEventListener("click", e=>{
    const b=e.target.closest(".tab"); if(!b) return;
    setView(b.dataset.view);
    if(view==="standby") renderStandby(); else render();
  });

  $("#file").addEventListener("change",e=>{ const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>load(r.result); r.readAsText(f); });
  const stream=$("#stream");
  ["dragover","dragenter"].forEach(ev=>stream.addEventListener(ev,e=>{e.preventDefault(); stream.classList.add("drag");}));
  ["dragleave","drop"].forEach(ev=>stream.addEventListener(ev,e=>{e.preventDefault(); if(ev!=="drop"||!stream.contains(e.relatedTarget)) stream.classList.remove("drag");}));
  stream.addEventListener("drop",e=>{ const f=e.dataTransfer.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>load(r.result); r.readAsText(f); });
  $("#btnPaste").addEventListener("click",()=>$("#pastePanel").classList.toggle("open"));
  $("#btnApply").addEventListener("click",()=>{ const v=$("#ta").value.trim(); if(v) load(v); $("#pastePanel").classList.remove("open"); });
  $("#btnSample").addEventListener("click",()=>{ $("#ta").value=SAMPLE; load(SAMPLE); });

  // ポスト化スタンバイは Drive を直読み（drive-snippets Worker の公開GET口 /pub/poststock 経由＝手動ミラー廃止）。?standby=URL で上書き可。
  (async ()=>{
    const ssrc=new URLSearchParams(location.search).get("standby") || "https://drive-snippets-mcp.gooooerer.workers.dev/pub/poststock";
    try{ const r=await fetch(ssrc); if(r.ok){ const t=await r.text(); if(/\|/.test(t)) loadStandby(t); } }catch(e){}
  })();

  (async ()=>{
    const src=new URLSearchParams(location.search).get("src") || "tasks.md"; // 既定で同repoのtasks.mdを読む
    try{ const r=await fetch(src); if(r.ok){ const txt=await r.text(); if(/\|/.test(txt)){ load(txt); return; } } }catch(e){}
    $("#ta").value=SAMPLE; load(SAMPLE); // tasks.mdが無ければサンプル表示
  })();
})();
</script>
</body>
</html>
